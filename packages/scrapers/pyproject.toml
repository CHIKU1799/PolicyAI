[project]
name = "policyai-scrapers"
version = "0.1.0"
description = "Scrapers for RBI and SEBI circulars (Playwright)"
requires-python = ">=3.11"
dependencies = [
    "playwright>=1.47",
    "httpx>=0.27",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/policyai_scrapers"]
