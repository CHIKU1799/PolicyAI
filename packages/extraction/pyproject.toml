[project]
name = "policyai-extraction"
version = "0.1.0"
description = "Claude-powered structured extraction from regulatory documents"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.39",
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/policyai_extraction"]
